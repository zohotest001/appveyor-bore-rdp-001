image: Visual Studio 2022
build: off
test: off

install:
  - ps: |
      # 1. Download Bore
      Write-Host "Downloading Bore..."
      Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
      Expand-Archive bore.zip -DestinationPath .
      
      # 2. Set the RDP Password (CHANGE THIS PASSWORD)
      Write-Host "Setting RDP password..."
      $pass = "StrongPassword123!"
      net user appveyor $pass
      
      # 3. Enable RDP (Just in case it's disabled)
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
      Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
      
      # 4. Start the Tunnel
      Write-Host "Starting Bore tunnel to bore.pub..."
      Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore.log"
      
      # 5. Wait for the port to be assigned and display it
      Start-Sleep -Seconds 10
      $log = Get-Content bore.log
      Write-Host "--- BORE LOG OUTPUT ---"
      Write-Host $log
      Write-Host "-----------------------"
      
      # 6. Prevent the build from finishing (Keeps RDP alive)
      Write-Host "RDP is ready. Look for the port number in the logs above."
      while($true) { Start-Sleep -Seconds 60 }
